<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎来到我的个人主页</h1>
        <p>这里是我在互联网上的小角落，你可以找到我的一些工作和兴趣爱好。</p>
        <p>以下是一些关于我你可能感兴趣的链接：</p>
        <ul>
            <li><a href="https://github.com">我的GitHub</a></li>
            <li><a href="https://linkedin.com">我的LinkedIn</a></li>
            <li><a href="https://twitter.com">我的Twitter</a></li>
        </ul>
        <p>这是我的最爱的图片：</p>
        <img src="your-favorite-photo.jpg" alt="我的最爱的图片">
    </div>
</body>
</html>
